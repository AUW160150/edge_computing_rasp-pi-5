apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pi-api
  template:
    metadata:
      labels:
        app: pi-api
    spec:
      containers:
        # Main API container
        - name: pi-api
          image: us-central1-docker.pkg.dev/rodela-trial-project/pi-api-repo/pi-agent-api:v4
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: rodela-trial-project
            # Route traffic to Pi through Tailscale SOCKS5 proxy (localhost:1055)
            - name: ALL_PROXY
              value: socks5h://localhost:1055
            # Don't proxy GCP metadata or internal traffic
            - name: NO_PROXY
              value: "169.254.169.254,metadata.google.internal,127.0.0.1,localhost"

        # Tailscale sidecar: joins Tailscale network and exposes SOCKS5 proxy on :1055
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth-key
                  key: key
            - name: TS_USERSPACE
              value: "true"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_SOCKS5_SERVER
              value: "localhost:1055"
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale

      volumes:
        - name: tailscale-state
          emptyDir: {}
